name: Initializing Database

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  init-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: vishal2611/Banking-app
          ref: main

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::508375325844:role/github-actions-deploy-role
          aws-region: us-east-1

      - name: Upload files to S3
        id: upload
        run: |
          aws s3 mb s3://508375325844-devops-scripts --region us-east-1 2>/dev/null || true
          aws s3 cp init.sql s3://508375325844-devops-scripts/init.sql
          aws s3 cp init.py s3://508375325844-devops-scripts/init.py
          echo "✅ Files uploaded to S3 successfully."

      - name: Initialize Database on RDS using EC2
        id: init-db
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands": [
                "aws s3 cp s3://508375325844-devops-scripts/init.sql",
                "aws s3 cp s3://508375325844-devops-scripts/init.py /tmp/init.py",
                "python3 /tmp/init.py || exit 1",
                "rm /tmp/init.sql /tmp/init.py"
              ]
            }' \
            --query "Command.CommandId" \
            --output text \
            --region us-east-1)

          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"
      - name: Show Results
        run: |
          sleep 20

          aws ssm list-command-invocations \
            --command-id "${{ steps.init-db.outputs.cmd_id }}" \
            --details \
            --region us-east-1 \
            --query "CommandInvocations[*].{Instance:InstanceId,Status:Status,IP:CommandPlugins[0].Output}" \
            --output text

          FAILED=$(aws ssm list-command-invocations \
            --command-id "${{ steps.init-db.outputs.cmd_id }}" \
            --details \
            --query "length(CommandInvocations[?Status=='Failed'])" \
            --output text \
            --region us-east-1)